spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/Stadium?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:main}
spring.datasource.password=${DB_PASSWORD:passwd}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
# Keep open-in-view enabled: existing services rely on lazy collections during serialization.
spring.jpa.open-in-view=true

server.port=${SERVER_PORT:8080}

# File upload limits (images for stadiums and team logos).
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail (optional; set MAIL_USERNAME / MAIL_PASSWORD env vars to enable real sending).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:Your-email}
spring.mail.password=${MAIL_PASSWORD:passwd}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator: expose only health publicly.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
# Disable mail health probe (dummy credentials would mark app DOWN).
management.health.mail.enabled=false

